<!DOCTYPE html>
<html>
<head>
  <title>The Brain Pro</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #0a0a0a; color: #fff; }
    .card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 20px 0; }
    button { background: #00ff88; color: #000; padding: 10px 20px; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🧠 The Brain Pro Dashboard</h1>
  
  <div class="card">
    <h2>Backend Status</h2>
    <p id="status">Checking...</p>
  </div>
  
  <div class="card">
    <h2>Portfolio</h2>
    <p id="portfolio">Loading...</p>
  </div>
  
  <button onclick="stopBot()">🛑 Emergency Stop</button>

  <script>
    const API = 'https://brain-pro-v2-production.up.railway.app';
    
    fetch(API + '/health')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').innerHTML = 
          `<span style="color:#00ff88">✅ ${data.status} (v${data.version})</span>`;
      });
    
    fetch(API + '/api/portfolio')
      .then(r => r.json())
      .then(data => {
        document.getElementById('portfolio').innerHTML = 
          `<strong>Equity:</strong> $${data.total_equity}<br>
           <strong>Assets:</strong> ${data.assets.join(', ')}`;
      });
    
    function stopBot() {
      fetch(API + '/api/emergency/stop', {method:'POST'})
        .then(r => r.json())
        .then(data => alert('Status: ' + data.status));
    }
  </script>
</body>
</html>
